# DESIGN-OPS Configuration v2.0
# Copy this to ~/.claude/do-config.yaml and fill in your values
#
# Setup: Run /do:setup for guided configuration
# Docs: https://github.com/opensesh/DESIGN-OPS

# ─────────────────────────────────────────────────────────────────────────────
# METADATA
# ─────────────────────────────────────────────────────────────────────────────
version: "2.0"
created: ""      # ISO date, set by /do:setup
updated: ""      # ISO date, updated on changes

# ─────────────────────────────────────────────────────────────────────────────
# THREE PILLARS
# ─────────────────────────────────────────────────────────────────────────────
# Each pillar contains:
#   - enabled: whether this pillar is active
#   - tools: connected data sources with capability matrices
#   - outcomes: what data to include in briefs/recaps
#
# Tool connection types:
#   - mcp: Native MCP server (ideal)
#   - api: Direct API integration (plugin handles calls)
#   - custom_wrapper: User-created MCP wrapper
#   - unavailable: Tool has no API or MCP support

pillars:
  # ───────────────────────────────────────────────────────────────────────────
  # OPERATIONS — Coordination, scheduling, task management
  # ───────────────────────────────────────────────────────────────────────────
  operations:
    enabled: false
    tools:
      # Notion example (MCP)
      # - id: notion
      #   type: mcp
      #   mcp_name: "notion"
      #   status: connected  # connected | needs_setup | unavailable
      #   capabilities:
      #     data_types: [pages, databases, tasks, comments]
      #     reporting:
      #       daily: [recent_pages, task_counts]
      #       weekly: [page_activity, task_completion]
      #       monthly: [content_growth]

      # Google Workspace example (MCP)
      # - id: google_workspace
      #   type: mcp
      #   mcp_name: "google-workspace"
      #   status: connected
      #   capabilities:
      #     data_types: [calendar, gmail, drive]
      #     reporting:
      #       daily: [todays_events, unread_emails]
      #       weekly: [event_count, email_volume]

      # Linear example (MCP)
      # - id: linear
      #   type: mcp
      #   mcp_name: "linear"
      #   status: needs_setup
      #   capabilities:
      #     data_types: [issues, projects, cycles]
      #     reporting:
      #       daily: [issues_due, assigned_issues]
      #       weekly: [issues_completed, cycle_progress]

      # Slack example (MCP)
      # - id: slack
      #   type: mcp
      #   mcp_name: "slack"
      #   status: connected
      #   capabilities:
      #     data_types: [messages, channels]
      #     reporting:
      #       daily: [unread_counts, recent_messages]
      #       weekly: [channel_activity]

    # What to include in daily/weekly/quarterly/ytd outputs
    outcomes:
      daily: []
        # - calendar_events      # Today's meetings (from google_workspace)
        # - tasks_due            # Tasks due today (from notion/linear)
        # - unread_emails        # Unread emails (from google_workspace)
        # - unread_messages      # Unread Slack messages (from slack)
      weekly: []
        # - week_overview        # Events attended (from google_workspace)
        # - tasks_completed      # Tasks done this week (from notion/linear)
        # - team_activity        # Team communication (from slack)
      quarterly: []
        # - quarter_goals        # Quarter goal progress (from notion/linear)
        # - budget_status        # Budget tracking (from notion)
        # - project_completions  # Projects completed this quarter (from notion/linear)
      ytd: []
        # - annual_goals         # Annual goal progress (from notion/linear)
        # - revenue_tracking     # Revenue metrics (from notion)
        # - client_retention     # Client retention rate (from notion)

  # ───────────────────────────────────────────────────────────────────────────
  # DESIGN — Creative work, code, visual assets
  # ───────────────────────────────────────────────────────────────────────────
  design:
    enabled: false
    tools:
      # GitHub example (MCP)
      # - id: github
      #   type: mcp
      #   mcp_name: "github"
      #   status: connected
      #   capabilities:
      #     data_types: [repos, commits, prs, issues]
      #     reporting:
      #       daily: [recent_commits, open_prs]
      #       weekly: [team_contributions, pr_activity]
      #       monthly: [merge_stats]
      #   tracked_repos:
      #     - owner: "opensesh"
      #       repo: "webapp"

      # Figma example (API - MCP exists but is code-focused)
      # - id: figma
      #   type: api
      #   auth:
      #     token_env: FIGMA_API_TOKEN  # or token: "figd_xxx"
      #   status: connected
      #   capabilities:
      #     data_types: [files, versions, comments, users]
      #     reporting:
      #       daily: [files_edited, active_users]
      #       weekly: [design_versions, comment_activity]
      #       monthly: [project_progress]
      #   tracked_projects:
      #     - id: "123456789"
      #       name: "Design System"
      #   tracked_files: []

      # GitLab example (MCP)
      # - id: gitlab
      #   type: mcp
      #   mcp_name: "gitlab"
      #   status: needs_setup
      #   capabilities:
      #     data_types: [repos, commits, merge_requests]

    outcomes:
      daily: []
        # - recent_commits       # Last 24h commits (from github/gitlab)
        # - open_prs             # PRs needing review (from github/gitlab)
        # - design_updates       # Figma files edited (from figma)
        # - active_users         # Who's working on what (from figma)
      weekly: []
        # - team_contributions   # Commits by person (from github/gitlab)
        # - design_versions      # Versions created (from figma)
        # - pr_activity          # PRs merged (from github/gitlab)
      quarterly: []
        # - shipped_projects     # Projects shipped this quarter (from github/figma)
        # - design_velocity      # PR velocity metrics (from github)
        # - system_coverage      # Design system coverage (from figma)
      ytd: []
        # - projects_shipped     # Total projects shipped (from github/figma)
        # - design_maturity      # Design system maturity score (from figma)
        # - component_growth     # New components added (from figma)

  # ───────────────────────────────────────────────────────────────────────────
  # ANALYTICS — Metrics, insights, reporting
  # ───────────────────────────────────────────────────────────────────────────
  analytics:
    enabled: false
    tools:
      # Google Analytics example (MCP)
      # - id: google_analytics
      #   type: mcp
      #   mcp_name: "ga4"
      #   status: connected
      #   capabilities:
      #     data_types: [pageviews, sessions, events, goals]
      #     reporting:
      #       daily: [session_count, top_pages]
      #       weekly: [traffic_trends, source_breakdown]
      #       monthly: [month_comparison]

      # Dub.co example (MCP)
      # - id: dubco
      #   type: mcp
      #   mcp_name: "dubco"
      #   status: connected
      #   capabilities:
      #     data_types: [links, clicks, referrers, geo]
      #     reporting:
      #       daily: [click_counts]
      #       weekly: [top_links, referrer_breakdown]

      # Substack example (custom wrapper - no official MCP)
      # - id: substack
      #   type: custom_wrapper
      #   mcp_name: "substack-wrapper"  # User-created MCP
      #   status: connected
      #   capabilities:
      #     data_types: [subscribers, posts, email_stats]
      #     reporting:
      #       daily: [new_subscribers]
      #       weekly: [subscriber_growth, post_views]

      # Instagram example (unavailable - API too limited)
      # - id: instagram
      #   type: unavailable
      #   status: skipped
      #   reason: "API limited to business accounts, restricted data access"

    outcomes:
      daily: []
        # - pageviews            # Today's page views (from google_analytics)
        # - link_clicks          # Click counts (from dubco)
        # - new_subscribers      # New subscribers (from substack)
      weekly: []
        # - traffic_trends       # Traffic patterns (from google_analytics)
        # - top_links            # Best performing links (from dubco)
        # - audience_growth      # Subscriber growth (from substack)
      quarterly: []
        # - quarter_trends       # Quarter traffic trends (from google_analytics)
        # - campaign_performance # Campaign metrics (from google_analytics)
        # - conversion_funnel    # Conversion funnel data (from google_analytics)
      ytd: []
        # - annual_traffic       # Total annual traffic (from google_analytics)
        # - yoy_comparison       # Year-over-year comparison (from google_analytics)
        # - total_growth         # Total growth metrics (from google_analytics/dubco)

# ─────────────────────────────────────────────────────────────────────────────
# TEAM MEMBERS (optional - for cleaner output)
# ─────────────────────────────────────────────────────────────────────────────
# Map platform handles to friendly names for better readability
team:
  members: []
    # - name: "Jordan Smith"
    #   handles:
    #     figma: "jordan.smith"
    #     github: "jordansmith"
    #     notion: "Jordan Smith"
    #     slack: "jordan"
