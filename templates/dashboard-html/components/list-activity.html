<!--
  Activity List Component

  Displays an ordered list of activities with timestamps and icons.

  Variables:
    {{ID}}            - Unique identifier for the list
    {{TITLE}}         - List title (e.g., "Recent Commits")
    {{ITEMS}}         - Array of activity items
    {{EMPTY_MESSAGE}} - Message when no items (optional)

  Item Variables:
    {{ITEM_TITLE}}    - Activity title
    {{ITEM_SUBTITLE}} - Secondary info (e.g., author, repo)
    {{ITEM_TIME}}     - Timestamp (e.g., "2h ago")
    {{ITEM_ICON}}     - Lucide icon name

  Data Format:
    {
      "type": "activity_list",
      "id": "recent-commits",
      "title": "Recent Commits",
      "items": [
        {
          "title": "feat: add dashboard",
          "subtitle": "Alex · main",
          "time": "2h ago",
          "icon": "git-commit"
        }
      ]
    }
-->

<div id="activity-{{ID}}" class="rounded-xl border p-6" style="background-color: var(--bg-secondary); border-color: var(--border-secondary);">
  <h3 class="text-sm font-medium mb-4" style="color: var(--fg-secondary);">{{TITLE}}</h3>

  {{#HAS_ITEMS}}
  <ul class="divide-y" style="border-color: var(--border-tertiary);">
    {{#ITEMS}}
    <li class="py-3 first:pt-0 last:pb-0">
      <div class="flex items-start gap-3">
        <!-- Icon -->
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background-color: var(--color-brand-50);">
          <i data-lucide="{{ITEM_ICON}}" class="w-4 h-4" style="color: var(--color-brand-600);"></i>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate" style="color: var(--fg-primary);">{{ITEM_TITLE}}</p>
          <p class="text-xs mt-0.5" style="color: var(--fg-tertiary);">{{ITEM_SUBTITLE}}</p>
        </div>

        <!-- Timestamp -->
        <span class="text-xs flex-shrink-0" style="color: var(--fg-quaternary);">{{ITEM_TIME}}</span>
      </div>
    </li>
    {{/ITEMS}}
  </ul>
  {{/HAS_ITEMS}}

  {{^HAS_ITEMS}}
  <p class="text-sm text-center py-4" style="color: var(--fg-tertiary);">{{EMPTY_MESSAGE}}</p>
  {{/HAS_ITEMS}}
</div>
