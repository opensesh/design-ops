<!--
  Bar Chart Component

  Displays categorical data as a bar chart using Chart.js.

  Variables:
    {{ID}}            - Unique identifier (used for canvas ID)
    {{TITLE}}         - Chart title
    {{SUBTITLE}}      - Optional subtitle/description
    {{HEIGHT}}        - Chart height in pixels (default: 256)

  Data Format (in dashboardData.charts):
    {
      "id": "chart-{{ID}}",
      "type": "bar",
      "label": "Clicks",
      "labels": ["Link A", "Link B", "Link C"],
      "data": [150, 89, 45]
    }
-->

<div id="card-{{ID}}" class="rounded-xl border p-6" style="background-color: var(--bg-secondary); border-color: var(--border-secondary);">
  <div class="mb-4">
    <h3 class="text-sm font-medium" style="color: var(--fg-secondary);">{{TITLE}}</h3>
    {{#SUBTITLE}}
    <p class="text-xs mt-1" style="color: var(--fg-tertiary);">{{SUBTITLE}}</p>
    {{/SUBTITLE}}
  </div>
  <div class="relative" style="height: {{HEIGHT}}px;">
    <canvas id="chart-{{ID}}"></canvas>
  </div>
</div>
