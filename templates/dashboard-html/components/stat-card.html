<!--
  Stat Card Component

  Displays a single metric with optional trend indicator.

  Variables:
    {{ID}}            - Unique identifier for the card
    {{TITLE}}         - Metric label (e.g., "Tasks Due")
    {{VALUE}}         - Main value (e.g., "12" or "$4,500")
    {{TREND}}         - Trend text (e.g., "+12%" or "-3")
    {{TREND_COLOR}}   - Tailwind class: "text-green-500", "text-red-500", "text-gray-500"
    {{ICON}}          - Lucide icon name (optional)

  Data Format:
    {
      "type": "single_metric",
      "id": "tasks-due",
      "title": "Tasks Due",
      "value": 12,
      "trend": "+3",
      "trend_direction": "up" | "down" | "neutral"
    }
-->

<div id="stat-{{ID}}" class="rounded-xl border p-6" style="background-color: var(--bg-secondary); border-color: var(--border-secondary);">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <!-- Optional icon -->
      {{#ICON}}
      <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: var(--color-brand-50);">
        <i data-lucide="{{ICON}}" class="w-5 h-5" style="color: var(--color-brand-600);"></i>
      </div>
      {{/ICON}}
      <p class="text-sm font-medium" style="color: var(--fg-secondary);">{{TITLE}}</p>
    </div>
    <!-- Trend indicator -->
    {{#TREND}}
    <div class="flex items-center gap-1 {{TREND_COLOR}}">
      {{#TREND_UP}}
      <i data-lucide="trending-up" class="w-4 h-4"></i>
      {{/TREND_UP}}
      {{#TREND_DOWN}}
      <i data-lucide="trending-down" class="w-4 h-4"></i>
      {{/TREND_DOWN}}
      <span class="text-sm font-medium">{{TREND}}</span>
    </div>
    {{/TREND}}
  </div>
  <p class="mt-3 text-3xl font-semibold tracking-tight" style="color: var(--fg-primary);">{{VALUE}}</p>
</div>
