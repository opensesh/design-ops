<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} | DESIGN-OPS Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <!-- Brand CSS (embedded) -->
  <style>
    {{BRAND_CSS}}
  </style>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Brand primitives
            'aperol': 'var(--color-aperol)',
            'charcoal': 'var(--color-charcoal)',
            'vanilla': 'var(--color-vanilla)',
            // Semantic background
            'bg-primary': 'var(--bg-primary)',
            'bg-secondary': 'var(--bg-secondary)',
            'bg-tertiary': 'var(--bg-tertiary)',
            'bg-brand-solid': 'var(--bg-brand-solid)',
            // Semantic foreground
            'fg-primary': 'var(--fg-primary)',
            'fg-secondary': 'var(--fg-secondary)',
            'fg-tertiary': 'var(--fg-tertiary)',
            'fg-brand': 'var(--fg-brand-primary)',
            // Semantic borders
            'border-primary': 'var(--border-primary)',
            'border-secondary': 'var(--border-secondary)',
            'border-brand': 'var(--border-brand)',
            // Status colors
            'success-50': 'var(--color-success-50)',
            'success-500': 'var(--color-success-500)',
            'warning-50': 'var(--color-warning-50)',
            'warning-500': 'var(--color-warning-500)',
            'error-50': 'var(--color-error-50)',
            'error-500': 'var(--color-error-500)',
          },
          fontFamily: {
            'display': ['var(--font-display)', 'system-ui', 'sans-serif'],
            'sans': ['var(--font-sans)', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            'brand': 'var(--radius-brand)',
            'brand-lg': 'var(--radius-brand-lg)',
          },
        }
      }
    }
  </script>

  <!-- Base styles -->
  <style>
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--fg-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Chart.js dark mode support */
    .dark canvas {
      filter: none;
    }

    /* Smooth transitions */
    * {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    /* Print styles */
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .bg-bg-secondary { background: #f9fafb !important; }
    }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-10 border-b" style="background-color: var(--bg-secondary); border-color: var(--border-secondary);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-semibold" style="color: var(--fg-primary);">{{TITLE}}</h1>
          <p class="text-sm mt-1" style="color: var(--fg-secondary);">{{SUBTITLE}}</p>
        </div>
        <div class="flex items-center gap-4 no-print">
          <!-- Dark mode toggle -->
          <button
            id="theme-toggle"
            class="p-2 rounded-lg border"
            style="background-color: var(--bg-tertiary); border-color: var(--border-secondary);"
            aria-label="Toggle dark mode"
          >
            <i data-lucide="sun" class="w-5 h-5 dark:hidden" style="color: var(--fg-secondary);"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block" style="color: var(--fg-secondary);"></i>
          </button>
          <!-- Refresh timestamp -->
          <span class="text-xs" style="color: var(--fg-tertiary);">
            Generated: {{TIMESTAMP}}
          </span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{CONTENT}}
  </main>

  <!-- Footer -->
  <footer class="border-t py-6 mt-8" style="border-color: var(--border-secondary);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm" style="color: var(--fg-tertiary);">
        Generated by <strong>DESIGN-OPS</strong> &middot;
        <a href="https://github.com/opensesh/DESIGN-OPS" class="hover:underline" style="color: var(--fg-brand-primary);">View on GitHub</a>
      </p>
    </div>
  </footer>

  <!-- Dashboard Data (for charts) -->
  <script>
    const dashboardData = {{DASHBOARD_DATA}};
  </script>

  <!-- Initialize Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>

  <!-- Dark mode toggle -->
  <script>
    // Check for saved preference or system preference
    function getThemePreference() {
      if (localStorage.getItem('theme')) {
        return localStorage.getItem('theme');
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.classList.toggle('dark', theme === 'dark');
      localStorage.setItem('theme', theme);
    }

    // Initial theme
    setTheme(getThemePreference());

    // Toggle button
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
      lucide.createIcons(); // Refresh icons
    });

    // Listen for system preference changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });
  </script>

  <!-- Initialize Charts -->
  <script>
    // Chart.js defaults for brand consistency
    Chart.defaults.font.family = getComputedStyle(document.body).getPropertyValue('--font-sans') || 'system-ui';
    Chart.defaults.color = getComputedStyle(document.body).getPropertyValue('--fg-secondary') || '#6b7280';

    // Get brand colors
    const brandAccent = getComputedStyle(document.documentElement).getPropertyValue('--color-aperol').trim() || '#FE5102';
    const brandAccentLight = getComputedStyle(document.documentElement).getPropertyValue('--color-brand-200').trim() || '#ffc8a8';

    // Initialize all charts from dashboardData
    if (dashboardData && dashboardData.charts) {
      dashboardData.charts.forEach((chartConfig) => {
        const ctx = document.getElementById(chartConfig.id);
        if (ctx) {
          new Chart(ctx, {
            type: chartConfig.type || 'bar',
            data: {
              labels: chartConfig.labels,
              datasets: [{
                label: chartConfig.label || '',
                data: chartConfig.data,
                backgroundColor: chartConfig.type === 'line'
                  ? 'transparent'
                  : brandAccent,
                borderColor: brandAccent,
                borderWidth: chartConfig.type === 'line' ? 2 : 0,
                borderRadius: chartConfig.type === 'bar' ? 6 : 0,
                fill: chartConfig.type === 'line',
                tension: 0.3,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: false
                }
              },
              scales: {
                x: {
                  grid: {
                    display: false
                  },
                  border: {
                    display: false
                  }
                },
                y: {
                  beginAtZero: true,
                  grid: {
                    color: getComputedStyle(document.documentElement).getPropertyValue('--border-secondary').trim() || '#e5e7eb'
                  },
                  border: {
                    display: false
                  }
                }
              }
            }
          });
        }
      });
    }
  </script>
</body>
</html>
