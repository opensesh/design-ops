# Known Tools Database
# Verified registry for MCP discovery - all packages validated
# This is the SOURCE OF TRUTH for DESIGN-OPS tool recommendations

version: "2.0"
last_validated: "2026-04-19"
validation_method: "npm view + official docs"

# Schema for each tool entry:
# - mcp_source: official | vendor | community | none
# - mcp_package: npm package name (null if HTTP or unavailable)
# - mcp_type: stdio | http (how to connect)
# - mcp_url: URL for HTTP MCPs
# - mcp_confidence: high | medium | low | none
# - validated: true (we verified this exists)
# - install_cmd: optional explicit install command
# - warning: optional caution message
# - note: optional context
# - env_required: list of required environment variables
# - api_docs: URL to API documentation
# - recommendation: mcp | api | both | unavailable

# ═══════════════════════════════════════════════════════════════
